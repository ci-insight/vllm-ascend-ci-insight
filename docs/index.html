<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vllm-ascend CI Insight</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<header>
  <div class="header-top">
    <h1 id="pageTitle">vllm-ascend CI Insight</h1>
    <div class="header-actions">
      <button id="refreshBtn" onclick="loadReports()">Refresh</button>
      <button id="langToggle" onclick="toggleLang()">中文</button>
    </div>
  </div>
  <nav class="tabs">
    <button class="tab active" data-tab="analysis" onclick="switchTab('analysis')">问题分析</button>
    <button class="tab" data-tab="ci-stats" onclick="switchTab('ci-stats')">CI执行分析</button>
  </nav>
</header>

<main>
  <!-- Tab: Problem Analysis -->
  <section id="tab-analysis" class="tab-content active">
    <div class="filters-bar">
      <input type="text" id="searchInput" placeholder="Search PR title, number..." />
      <select id="severityFilter">
        <option value="">All Severities</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <select id="categoryFilter">
        <option value="">All Categories</option>
        <option value="code">Code Bug</option>
        <option value="build">Build/CI Script</option>
        <option value="infra">Infrastructure</option>
        <option value="test">Test Case</option>
        <option value="lint">Lint/Format</option>
        <option value="compat">Compatibility</option>
        <option value="perf">Performance</option>
        <option value="other">Other</option>
      </select>
    </div>
    <section class="metrics" id="metrics"></section>
    <section class="charts">
      <div class="chart-box"><h3 id="chartSeverityTitle">Severity Breakdown</h3><canvas id="chartSeverity"></canvas></div>
      <div class="chart-box"><h3 id="chartWorkflowTitle">Top Failing Workflows</h3><canvas id="chartWorkflow"></canvas></div>
      <div class="chart-box full"><h3 id="chartCategoryTitle">Category Breakdown</h3><canvas id="chartCategory"></canvas></div>
    </section>
    <section class="report-section">
      <h3 id="reportSectionTitle">Recent Reports</h3>
      <div id="reportList"><div class="loading">Loading...</div></div>
    </section>
  </section>

  <!-- Tab: CI Execution Analysis -->
  <section id="tab-ci-stats" class="tab-content">
    <section class="metrics" id="ciMetrics"></section>
    <section class="charts">
      <div class="chart-box">
        <h3 id="chartDurationTitle">Job Duration Distribution (P50/P90/P20)</h3>
        <canvas id="chartDuration"></canvas>
      </div>
      <div class="chart-box">
        <h3 id="chartQueueTitle">Queue Wait Time</h3>
        <canvas id="chartQueue"></canvas>
      </div>
      <div class="chart-box">
        <h3 id="chartSuccessTitle">Success Rate by Workflow</h3>
        <canvas id="chartSuccess"></canvas>
      </div>
      <div class="chart-box">
        <h3 id="chartSlowestTitle">Slowest Jobs (Top 10)</h3>
        <canvas id="chartSlowest"></canvas>
      </div>
    </section>
  </section>
</main>

<!-- Detail Modal -->
<div id="detailModal" class="modal" onclick="if(event.target===this)closeDetail()">
  <div class="modal-content">
    <button class="modal-close" onclick="closeDetail()">&times;</button>
    <div id="detailContent"></div>
  </div>
</div>

<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
